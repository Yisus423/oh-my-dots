set -g mouse on
source-file "~/.tmux-themepack/basic.tmuxtheme"

# 1. Cambiar el prefijo a Ctrl+a (más cómodo que Ctrl+b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 2. División de paneles más lógica (v de vertical, h de horizontal)
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 3. Moverse entre paneles con las flechas (sin soltar el prefijo)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# 4. Mejorar la estética: Barra de estado abajo
set -g status-bg black
set -g status-fg cyan
set -g status-interval 5
set -g status-left "#[fg=green][#S] "
set -g status-right "#[fg=yellow]%H:%M #[fg=white]| #[fg=magenta]Termux"

# 5. Historial infinito (útil para ver logs largos de compilación)
set -g history-limit 10000

# 6. Sincronizar paneles (escribe en todos a la vez, ¡peligroso pero pro!)
bind y set-window-option synchronize-panes
